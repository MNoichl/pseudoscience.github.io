<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Correlation Map Comparison</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Jost', sans-serif;
            background-color: #f5f5f5;
            overflow-y: auto;
        }
        
        .container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            width: 100vw;
        }
        
        .map-section {
            display: flex;
            flex-direction: column;
            height: 90vh;
            width: 100vw;
            margin-bottom: 20px;
        }
        
        iframe {
            width: 100%;
            height: calc(90vh - 40px);
            border: none;
            background: white;
        }
        
        .comment {
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .new-version {
            background-color: #2c5aa0;
        }
        
        .old-version {
            background-color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="map-section">
            <iframe src="correlation_sample_map_new.html" title="New Correlation Map"></iframe>
            <div class="comment new-version">Correlation Map, late 2025 version</div>
        </div>
        
<!--        <div class="map-section">
            <iframe src="correlation_map_v1.html" title="Old Correlation Map"></iframe>
            <div class="comment old-version">Correlation Map, early 2025 version, as included with the original proposal.</div>
        </div> -->
    </div>
</body>
</html>
